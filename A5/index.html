<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Particles</title>
</head>
<body>
  <canvas style="width:800px;height:600px;display:block;"></canvas>
  <div style="margin-top:8px;">
    <label>
      Flame Height:
      <input id="heightSlider" type="range" min="0.1" max="2.0" step="0.01" value="0.7">
      <span id="heightVal">0.7</span>
    </label>
  </div>
  <div style="margin-top:8px;">
    <label>
      Speed:
      <input id="speedSlider" type="range" min="0.1" max="3.0" step="0.01" value="1.0">
      <span id="speedVal">1.00</span>
    </label>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
